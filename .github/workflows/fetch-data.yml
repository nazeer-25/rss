name: fetch-data

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      rt:
        description: 'rt'
        required: false
  repository_dispatch:
    types: [opened]
  schedule:
    - cron: "*/5 * * * *" # https://docs.github.com/cn/actions/learn-github-actions/events-that-trigger-workflows

jobs:

  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.17

    - name: Fetch Data
      run: |
        ( cd /tmp && git clone https://github.com/chyroc/grss grssrepo && cd grssrepo && go build -o /tmp/grss ./cmd/grss/main.go )
        /tmp/grss
        ( cd /tmp && git clone https://github.com/chyroc/mdcat mdcatrepo && cd mdcatrepo && go build -o /tmp/mdcat main.go )
        # /tmp/mdcat --title "Git RSS" --output index.html README.md
      env:
        FEEDBIN_USERNAME: ${{ secrets.FEEDBIN_USERNAME }}
        FEEDBIN_PASSWORD: ${{ secrets.FEEDBIN_PASSWORD }}

    - name: Commit and Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add --all
        git commit -am "Automated Commit: $(date)" || echo "no commit"
        git push || echo "no push"
